on:
  workflow_call:
    inputs:
      base_sha:
        description: The base SHA to use for checkout
        type: string
        required: true
      from:
        description: The base container to build from
        type: string
        required: true
      uri:
        description: The uri for the container
        type: string
        required: true
      build_args:
        description: Extra build args to pass
        type: string
        required: false
        default: ""
      context:
        description: Context for the build
        type: string
        required: false
        default: "./"
      file:
        description: The path to the dockerfile
        type: string
        required: false
        default: Dockerfile

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: idaholab/moose/checkout@actions
        name: Checkout
        with:
          pr_base_sha: ${{ inputs.base_sha }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: true
          tags: ${{ inputs.uri }}
          cache-from: |
            type=registry,ref=${{ inputs.uri }}-cache
            type=registry,ref=${{ inputs.uri }}
          cache-to: type=registry,ref=${{ inputs.uri }}-cache,mode=max
          build-args: |
            BUILD_JOBS=4
            BASE_IMAGE=${{ inputs.from }}
            ${{ inputs.build_args }}
