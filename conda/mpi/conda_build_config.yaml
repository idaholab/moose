mpi:
  - mpich
  - openmpi

mpi_version:
  # MPICH version
  - 4.3.2
  # OpenMPI version
  - 5.0.10

mpi_friendly_name:
  - MPICH
  - OpenMPI

mpi_website:
  - http://www.mpich.org/documentation/guides
  - https://www.open-mpi.org/doc/

mpi_dev_website:
  - https://github.com/pmodels/mpich
  - https://github.com/open-mpi/ompi

zip_keys:
  - mpi
  - mpi_version
  - mpi_friendly_name
  - mpi_website
  - mpi_dev_website

moose_hdf5:
  - hdf5 1.14.6         # [linux]
  - hdf5 1.14.6         # [osx]

moose_libexpat:
  - libexpat 2.7.1

### If you change these versions, change also conda/wasp/*, conda/seacas/*
moose_cmake:
  - cmake 4

### If you change these versions, change also conda/wasp/*, conda/seacas/*
moose_cc:
  - gcc 14.3.0 h0dff253_18                                  # [linux]
  - clang 19.1.7 default_h1323312_8                         # [not arm64 and osx]
  - clang 19.1.7 default_hf9bcbb7_8                         # [arm64]

### If you change these versions, change also conda/wasp/*, conda/seacas/*
moose_cxx:
  - gxx 14.3.0 h76987e4_18                                  # [linux]
  - clangxx 19.1.7 default_h9089c59_8                       # [not arm64 and osx]
  - clangxx 19.1.7 default_hc995acf_8                       # [arm64]

### If you change these versions, change also conda/seacas/*
moose_gfortran:
  - gfortran 14.3.0 h76987e4_18                             # [linux]
  - gfortran 14.3.0 hcc3c99d_0                              # [not arm64 and osx]
  - gfortran 14.3.0 h3ef1dbf_0                              # [arm64]

### Cmake requires these be installed in order to "find" compilers
moose_ccompiler:
  - gcc_linux-64                                            # [linux]
  - clang_osx-64                                            # [not arm64 and osx]
  - clang_osx-arm64                                         # [arm64]

moose_cxxcompiler:
  - gxx_linux-64                                            # [linux]
  - clangxx_osx-64                                          # [not arm64 and osx]
  - clangxx_osx-arm64                                       # [arm64]

moose_libgfortran5:
  - libgfortran5 15.2.0 h68bc16d_18                         # [linux]
  - libgfortran5 15.2.0 hd16e46c_18                         # [not arm64 and osx]
  - libgfortran5 15.2.0 hdae7583_18                         # [arm64]

moose_gcc_impl:                                             # [linux]
  - gcc_impl_linux-64                                       # [linux]

moose_gfortran_impl:                                        # [linux]
  - gfortran_impl_linux-64 14.3.0 h1a219da_18               # [linux]

### Below are pinings created at the time of render
### based on above content. If any of the above
### content changes, modification will be needed below
moose_libstdcxx:                                            # [linux]
  - libstdcxx 15.2.0 h934c35e_18                            # [linux]

moose_libstdcxx_devel:                                      # [linux]
  - libstdcxx-devel_linux-64 14.3.0 h9f08a49_118            # [linux]

moose_libcxx:
  - libcxx 22.1.2 ha0f52bf_0                                # [linux]
  - libcxx 22.1.2 h19cb2f5_0                                # [not arm64 and osx]
  - libcxx 22.1.2 h55c6f16_0                                # [arm64]

moose_libzlib:
  - libzlib 1.3.2 h25fd6f3_2                                # [linux]
  - libzlib 1.3.2 hbb4bfdb_2                                # [not arm64 and osx]
  - libzlib 1.3.2 h8088a28_2                                # [arm64]

# Needed for psycopg2 2.9.11
moose_icu:
  - icu 75.1

# Needed for psycopg2 2.9.11
moose_krb5:
  - krb5 1.21.3

moose_cctools:                                              # [osx]
  - cctools_osx-64 1030.6.3 llvm19_1_h8f0d4bb_4             # [not arm64 and osx]
  - cctools_osx-arm64 1030.6.3 llvm19_1_hd01ab73_4          # [arm64]

moose_compiler_rt:                                          # [osx]
  - compiler-rt 19.1.7 he914875_1                           # [not arm64 and osx]
  - compiler-rt 19.1.7 h855ad52_1                           # [arm64]

moose_clang_osx:                                            # [osx]
  - clangxx_osx-64 19.1.7 h8a78ed7_31                       # [not arm64 and osx]
  - clangxx_osx-arm64 19.1.7 h75f8d18_31                    # [arm64]

moose_llvm_openmp:                                          # [osx]
  - llvm-openmp 22.1.2 h0d3cbff_0                           # [not arm64 and osx]
  - llvm-openmp 22.1.2 hc7d1edf_0                           # [arm64]

moose_llvm_tools:                                           # [osx]
  - llvm-tools 19.1.7 hb0207f0_2                            # [not arm64 and osx]
  - llvm-tools 19.1.7 h855ad52_2                            # [arm64]

moose_libclang:                                             # [osx]
  - libclang-cpp19.1 19.1.7 default_h9399c5b_8              # [not arm64 and osx]
  - libclang-cpp19.1 19.1.7 default_hf3020a7_8              # [arm64]

CONDA_BUILD_SYSROOT:                                        # [osx]
  - /opt/conda-sdks/MacOSX13.3.sdk                          # [osx]

macos_min_version:                                          # [osx]
  - 13.3                                                    # [osx]

macos_machine:                                              # [osx]
  - x86_64-apple-darwin22.0.0                               # [not arm64 and osx]
  - arm64-apple-darwin22.0.0                                # [arm64]

MACOSX_DEPLOYMENT_TARGET:                                   # [osx]
  - 13.3                                                    # [osx]
