package:
  name: moose-peacock
  version: __VERSIONER_PEACOCK_VERSION__

source:
  path: ../peacock

build:
  number: __VERSIONER_PEACOCK_BUILD_NUMBER__
  string: {{ mpi }}___VERSIONER_PEACOCK_BUILD_NUMBER__

requirements:
  run:
    - {{ mpi }}
    - {{ moose_mpi }}
    - pyaml
    - numpy
    - pandas
    - pyqt
    - matplotlib !=3.9.0
    - libgl                           # [linux]
    - vtk
  run_constrained:
    # Python max constraints
    - python <{{3.12}}

test:
  imports:
    - PyQt5
    - pandas
    - matplotlib
    - vtk

about:
  home: https://mooseframework.org/
  license: LGPL 2.1
  summary: >
    This superficial module (moose-peacock) acts as a top-level module designed to provide all
    dependencies required in order to run Peacock.

extra:
  recipe-maintainers:
    - milljm
