# Making a Change to this package?
# REMEMBER TO UPDATE the .yaml files for the following packages:
#   moose/conda_build_config.yaml
# As well as any directions pertaining to modifying those files.
{% set version = "2026.06.16" %}

package:
  name: moose-dev
  version: {{ version }}

build:
  number: 0
  string: {{ mpi }}
  script_env:
    - REQUESTS_CA_BUNDLE
    - SSL_CERT_FILE
    - CURL_CA_BUNDLE
    - NODE_EXTRA_CA_CERTS
  run_exports:
    # things that depend on this moose-dev must use the
    # exact moose-* packages that this was built with
    - moose-build 2026.06.16 {{ mpi }}
    - moose-libmesh 2026.06.05_ab36c00 {{ mpi }}_0
    - moose-wasp 2026.06.15_d8777a8 build_0
    - moose-tools 2026.06.16

requirements:
  run:
    - moose-build 2026.06.16 {{ mpi }}
    - moose-libmesh 2026.06.05_ab36c00 {{ mpi }}_0
    - moose-wasp 2026.06.15_d8777a8 build_0
    - moose-tools 2026.06.16
  run_constrained:
    - {{ moose_python_constrained }}

about:
  home: https://mooseframework.inl.gov/
  license: LGPL 2.1
  summary: >
    A simple package which installs all necessary Conda packages for MOOSE based development.

extra:
  recipe-maintainers:
    - cticenhour
    - loganharbour
