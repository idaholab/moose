{% set version = "2026.04.27" %}

package:
  name: moose-dev
  version: {{ version }}

build:
  number: 0
  string: {{ mpi }}
  script_env:
    - REQUESTS_CA_BUNDLE
    - SSL_CERT_FILE
    - CURL_CA_BUNDLE
    - NODE_EXTRA_CA_CERTS
  run_exports:
    # things that depend on this moose-dev must use the
    # exact moose-* packages that this was built with
    - moose-build 2026.04.27 {{ mpi }}
    - moose-libmesh 2026.04.13_0185b8b {{ mpi }}_0
    - moose-wasp 2025.09.19_02960f1 build_6
    - moose-tools 2026.04.21

requirements:
  run:
    - moose-build 2026.04.27 {{ mpi }}
    - moose-libmesh 2026.04.13_0185b8b {{ mpi }}_0
    - moose-wasp 2025.09.19_02960f1 build_6
    - moose-tools 2026.04.21
  run_constrained:
    - {{ moose_python_constrained }}

about:
  home: https://mooseframework.inl.gov/
  license: LGPL 2.1
  summary: >
    A simple package which installs all necessary Conda packages for MOOSE based development.

extra:
  recipe-maintainers:
    - cticenhour
    - loganharbour
