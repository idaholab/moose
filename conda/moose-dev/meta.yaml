# Making a Change to this package?
# REMEMBER TO UPDATE the .yaml files for the following packages:
#   moose/conda_build_config.yaml
# As well as any directions pertaining to modifying those files.
{% set version = "2026.04.16" %}

package:
  name: moose-dev
  version: {{ version }}

build:
  number: 0
  string: {{ mpi }}
  script_env:
    - REQUESTS_CA_BUNDLE
    - SSL_CERT_FILE
    - CURL_CA_BUNDLE
    - NODE_EXTRA_CA_CERTS
  run_exports:
    - moose-build 2026.04.16 {{ mpi }}
    - moose-libmesh 2026.04.13_0185b8b {{ mpi }}_0
    - moose-wasp 2025.09.19_02960f1 build_6
    - moose-tools 2026.04.16

requirements:
  run:
    - moose-build 2026.04.16 {{ mpi }}
    - moose-libmesh 2026.04.13_0185b8b {{ mpi }}_0
    - moose-wasp 2025.09.19_02960f1 build_6
    - moose-tools 2026.04.16
  run_constrained:
    - {{ moose_python_constrained }}

about:
  home: https://mooseframework.inl.gov/
  license: LGPL 2.1
  summary: >
    A simple package which installs all necessary Conda packages for MOOSE based development.

extra:
  recipe-maintainers:
    - cticenhour
    - loganharbour
