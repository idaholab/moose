# Making a Change to this package?
# REMEMBER TO UPDATE the .yaml files for the following packages:
#   moose-dev/*
#
# As well as any directions pertaining to modifying those files.
{% set version = "2026.06.16" %}

package:
  name: moose-tools
  version: {{ version }}

source:
  path: ../tools

build:
  number: 0
  script_env:
    - REQUESTS_CA_BUNDLE
    - SSL_CERT_FILE
    - CURL_CA_BUNDLE
    - NODE_EXTRA_CA_CERTS
requirements:
  build:
    - python {{ python }}
    - setuptools
  #
  # NOTE: These should mirror ./requirements.txt as much as possible.
  #
  # ./requirements.txt is used to setup the python environment
  # within apptainer distributions.
  #
  run:
    - beautifulsoup4
    - black {{ black }}
    - clang-format {{ clang_format }}
    - clang-tools {{ clang_tools }}
    - coverage {{ coverage }}
    - deepdiff
    - git-lfs
    - gitpython
    - graphviz
    - h5py
    - jinja2
    - livereload
    - lxml
    - mako
    - matplotlib-base
    - mock
    - numpy
    - packaging
    - pandas
    - paramiko
    - plotly
    - psutil
    - psycopg2
    - pyarrow
    - pybtex
    - pycobertura
    - pyflakes
    - pylatexenc
    - pylint
    - pymongo
    - pytest
    - pytest-cov
    - python
    - pyyaml
    - requests
    - ruff {{ ruff }}
    - scikit-image
    - setuptools
    - sympy
    - tabulate
    - uncertainties
    - xmltodict {{ xmltodict }}
    - yaml
test:
  commands:
    - black --version
    - clang-format --version
    - dot -V
    - git-lfs --version
    - pg_config --help
    - ruff --version
  imports:
    - bs4
    - deepdiff
    - coverage
    - git
    - jinja2
    - livereload
    - lxml
    - matplotlib
    - mock
    - numpy
    - pandas
    - psycopg2
    - pyarrow
    - pybtex
    - pycobertura
    - pyflakes
    - pylatexenc
    - pylint
    - pymongo
    - pytest
    - requests
    - skimage
    - sympy
    - tabulate
    - xmltodict
    - yaml

about:
  home: https://mooseframework.inl.gov/
  license: LGPL 2.1
  summary: >
    This superficial module (moose-tools) acts as a top-level module designed to provide all
    dependencies required in order to run the TestHarness, clang-format, and create MOOSE
    Documentation.

extra:
  recipe-maintainers:
    - cticenhour
    - loganharbour
