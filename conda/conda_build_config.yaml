black:
  - 26.1.0

clang_format:
  - 19

clang_tools:
  - 19

coverage:
  - 7.13.2

python:
  - 3.14
  - 3.13
  - 3.12
  - 3.11
  - 3.10

moose_python_constrained:
  - python >=3.10,<3.15

ruff:
  - 0.15.1

xmltodict:
  - <0.14

##
## MPI
##

mpi:
  - mpich
  - openmpi

mpi_version:
  - 5.0.1
  - 5.0.10

mpi_friendly_name:
  - MPICH
  - OpenMPI

zip_keys:
  - mpi
  - mpi_version
  - mpi_friendly_name

##
## Compilers from conda-forge-pinning
##
## Should update regularly to keep pins in line with other
## conda-forge packages
##

c_compiler:
  - gcc                                                     # [linux]
  - clang                                                   # [osx]
c_compiler_version:
  - 14                                                      # [linux]
  - 19                                                      # [osx]

cxx_compiler:
  - gxx                                                     # [linux]
  - clangxx                                                 # [osx]
cxx_compiler_version:
  - 14                                                      # [linux]
  - 19                                                      # [osx]

fortran_compiler:
  - gfortran
fortran_compiler_version:
  - 14

##
## Packages from conda-forge-pinning that we use
##
## Should update regularly to keep pins in line with other
## conda-forge packages
##

bzip2:
  - 1
fmt:
  - '12.0'
hdf5:
  - 1.14.6
krb5:
  - '1.22'
libaec:
  - '1'
libcap:
  - '2.77'
libcurl:
  - 8
libffi:
  - '3.5'
libhwloc:
  - 2.12.2
libiconv:
  - 1
libssh2:
  - 1
libuuid:
  - 2
libxcb:
  - '1'
libxml2:
  - '2.14'
ncurses:
  - 6
openssl:
  - '3.5'
perl:
  - 5.32.1
readline:
  - "8"
ucc:
  - 1
ucx:
  - '1.20'
xz:
  - 5
zlib:
  - 1
zstd:
  - '1.5'

##
## System root
##

CONDA_BUILD_SYSROOT:                                        # [osx]
  - /opt/conda-sdks/MacOSX13.3.sdk                          # [osx]

c_stdlib:
  - sysroot                                                 # [linux]
  - macosx_deployment_target                                # [osx]

c_stdlib_version:
  - 2.17                                                    # [linux]
  - 13.3                                                    # [osx]
