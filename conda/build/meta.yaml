# Making a Change to this package?
# REMEMBER TO UPDATE the .yaml files for the following packages:
#   moose-dev/*
#
# As well as any directions pertaining to modifying those files.
# ALSO: Follow the directions in scripts/tests/versioner_hashes.yaml
{% set version = "2026.06.07" %}

package:
  name: moose-build
  version: {{ version }}

source:
  - path: ../../scripts/get_mac_sdk.sh # [osx]

build:
  number: 0
  string: {{ mpi }}
  run_exports:
    # things that depend on this moose-build must use
    # these versions (pin mpi + compiler)
    - {{ mpi }} {{ mpi_version }}
    - {{ moose_c_compiler }}
    - {{ moose_cxx_compiler }}
    - {{ moose_fortran_compiler }}

requirements:
  build:
    - {{ mpi }} {{ mpi_version }}
    - {{ mpi }}-mpicc
    - {{ mpi }}-mpicxx
    - {{ mpi }}-mpifort
    - {{ moose_c_compiler }}
    - {{ moose_cxx_compiler }}
    - {{ moose_fortran_compiler }}
  run:
    - {{ mpi }} {{ mpi_version }}
    - {{ mpi }}-mpicc
    - {{ mpi }}-mpicxx
    - {{ mpi }}-mpifort
    - {{ moose_c_compiler }}
    - {{ moose_cxx_compiler }}
    - {{ moose_fortran_compiler }}
    {% if mpi == "mpich" %}
    # see libfabric entry in conda/conda_build_config.yaml
    - libfabric {{ libfabric }} # [linux]
    {% endif %}
    # Compiler symlinks (example: make "gcc" available on path)
    - gcc                 # [linux]
    - clang               # [osx]
    - gxx                 # [linux]
    - clangxx             # [osx]
    - gfortran
    # libMesh dependencies
    - libtirpc
    # Parallel HDF5
    - hdf5 {{ hdf5 }}
    - hdf5 {{ hdf5 }} mpi_{{ mpi }}_*
    # Build tools
    - bison
    - cmake
    - make
    - ninja
    - patchelf # [linux]
    - pkg-config

test:
  commands:
    - gcc --version        # [linux]
    - clang --version      # [osx]
    - g++ --version        # [linux]
    - clang++ --version    # [osx]
    - gfortran --version
    - mpicc -show
    - mpicxx -show
    - mpifort -show

about:
  home: https://mooseframework.inl.gov/
  license: LGPL 2.1
  summary: Provides MPI wrapper and toolchain for MOOSE based development with {{ mpi_friendly_name }}.

extra:
  recipe-maintainers:
    - cticenhour
    - loganharbour
